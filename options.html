<!DOCTYPE html>
<html>
<head>
  <title>自定义搜索设置</title>
  <meta charset="utf-8">
  <style>
    body {
      padding: 20px;
    }
    .container {
      width: 500px;
      margin: 0 auto;
    }
    input[type="text"] {
      width: 100%;
      padding: 5px;
      margin: 10px 0;
    }
    button {
      padding: 5px 10px;
    }
    #status {
      color: green;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>搜索设置</h2>
    <label for="searchUrl">搜索 URL (在URL末尾将添加搜索词):</label>
    <input type="text" id="searchUrl">
    <button id="save">保存</button>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
